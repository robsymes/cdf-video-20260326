name: Render Video
on: [push]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (for CLJS)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Compile ClojureScript
        run: npx shadow-cljs release remotion

      - name: Render Video
        run: npx remotion render src/index.ts MyVideo out.mp4

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: out.mp4


